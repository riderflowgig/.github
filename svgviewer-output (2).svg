</g>

<!-- outer rim -->
<circle cx="340" cy="180" r="108" fill="none" stroke="#7c3aed" stroke-width="3" opacity="0.5" style="fill:none;stroke:rgb(124, 58, 237);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
