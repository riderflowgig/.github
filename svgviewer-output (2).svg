<!-- ── LARGE ICON (main showcase) ── -->
<rect x="190" y="30" width="300" height="300" rx="68" fill="#0c0a1e" style="fill:rgb(12, 10, 30);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>



<!-- spoke wheel — 6 spokes -->
